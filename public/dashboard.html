<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שילובילו — לוח בקרה</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Heebo', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              50:  '#EEF2FF',
              100: '#E0E7FF',
              500: '#6366F1',
              600: '#4F46E5',
              700: '#4338CA',
            },
          },
        },
      },
    };
  </script>

  <style>
    html, body { font-family: 'Heebo', system-ui, sans-serif; }
    * { -webkit-tap-highlight-color: transparent; }

    /* Card hover lift */
    .card-lift { transition: transform .18s ease, box-shadow .18s ease; }
    .card-lift:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }

    /* Tab button underline animation */
    .tab-btn { position: relative; transition: color .18s ease; }
    .tab-btn::after {
      content: ''; position: absolute; bottom: -1px; left: 12%; right: 12%;
      height: 2px; background: currentColor; transform: scaleX(0);
      transition: transform .22s ease; border-radius: 2px;
    }
    .tab-btn.active::after { transform: scaleX(1); }

    /* Fade-in on load */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp .35s ease both; }

    /* Staggered cards */
    .stagger > * { animation: fadeUp .4s ease both; }
    .stagger > *:nth-child(1) { animation-delay: .02s; }
    .stagger > *:nth-child(2) { animation-delay: .08s; }
    .stagger > *:nth-child(3) { animation-delay: .14s; }
    .stagger > *:nth-child(4) { animation-delay: .20s; }
    .stagger > *:nth-child(5) { animation-delay: .26s; }
    .stagger > *:nth-child(6) { animation-delay: .32s; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #E5E7EB 25%, #F3F4F6 50%, #E5E7EB 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: .5rem;
    }
    .dark .skeleton { background: linear-gradient(90deg, #374151 25%, #4B5563 50%, #374151 75%); background-size: 200% 100%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Smooth scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }

    /* Slider (range) */
    input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; outline: none; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
      background: #4F46E5; cursor: pointer; border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    .slider-pain  { background: linear-gradient(90deg, #34d399, #fbbf24, #ef4444); }
    .slider-mood  { background: linear-gradient(90deg, #ef4444, #fbbf24, #34d399); }
    .slider-sleep { background: linear-gradient(90deg, #818cf8, #4F46E5); }

    /* Hide scrollbar for horizontal tabs */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="bg-gray-50 dark:bg-slate-950 text-gray-900 dark:text-slate-100 min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/80 dark:bg-slate-900/80 backdrop-blur border-b border-gray-200 dark:border-slate-800">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🚀</span>
        <div>
          <h1 class="text-base sm:text-lg font-bold leading-tight">שילובילו — לוח בקרה</h1>
          <div class="flex items-center gap-2 text-[10px] sm:text-xs text-gray-500 dark:text-slate-400">
            <span id="supabase-dot" class="inline-block w-1.5 h-1.5 rounded-full bg-gray-400"></span>
            <span id="supabase-label">מתחבר...</span>
            <span>·</span>
            <span id="ts">—</span>
          </div>
        </div>
      </div>
      <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800 transition" title="מצב בהיר/כהה">
        <span class="dark:hidden">🌙</span>
        <span class="hidden dark:inline">☀️</span>
      </button>
    </div>

    <!-- Tabs -->
    <nav class="max-w-6xl mx-auto px-2 overflow-x-auto no-scrollbar">
      <div class="flex gap-1 text-sm font-medium" role="tablist">
        <button class="tab-btn active px-4 py-3 whitespace-nowrap text-brand-600 dark:text-brand-500" data-tab-button="overview">📊 סקירה</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="tasks">📋 משימות</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="habits">✅ הרגלים</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="leads">💼 לידים</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="expenses">💰 הוצאות</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="health">🏥 בריאות</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="stocks">📈 מניות</button>
      </div>
    </nav>
  </header>

  <!-- Main content -->
  <main class="max-w-6xl mx-auto px-4 py-6 pb-24">
    <section data-tab="overview"><div id="overview-content" class="fade-up"><div class="grid grid-cols-2 md:grid-cols-4 gap-3"><div class="skeleton h-24"></div><div class="skeleton h-24"></div><div class="skeleton h-24"></div><div class="skeleton h-24"></div></div></div></section>
    <section data-tab="tasks" class="hidden"><div id="tasks-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
    <section data-tab="habits" class="hidden"><div id="habits-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
    <section data-tab="leads" class="hidden"><div id="leads-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
    <section data-tab="expenses" class="hidden"><div id="expenses-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
    <section data-tab="health" class="hidden"><div id="health-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
    <section data-tab="stocks" class="hidden"><div id="stocks-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
  </main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-1/2 translate-x-1/2 translate-y-4 opacity-0 pointer-events-none transition-all duration-200
                        bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-5 py-3 rounded-xl shadow-2xl text-sm font-medium z-50">
  </div>

<script>
'use strict';

// ── Telegram WebApp boot ─────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── State ────────────────────────────────────────────────────────────────────
let D = null;
let activeTab = 'overview';
const charts = {};
const TABS = ['overview','tasks','habits','leads','expenses','health','stocks'];

// ── Theme ────────────────────────────────────────────────────────────────────
(function initTheme() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const dark = saved ? saved === 'dark' : prefersDark;
  document.documentElement.classList.toggle('dark', dark);
})();
document.getElementById('theme-toggle').addEventListener('click', () => {
  const root = document.documentElement;
  root.classList.toggle('dark');
  localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
  // Re-render current tab so chart colors update
  renderActive();
});

// ── Utilities ────────────────────────────────────────────────────────────────
function fmt(n, d = 0) {
  if (n == null || isNaN(n)) return '—';
  return (+n).toLocaleString('he-IL', { maximumFractionDigits: d });
}
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = (isErr
    ? 'fixed bottom-6 right-1/2 translate-x-1/2 translate-y-0 opacity-100 bg-red-600 text-white'
    : 'fixed bottom-6 right-1/2 translate-x-1/2 translate-y-0 opacity-100 bg-slate-900 dark:bg-white text-white dark:text-slate-900')
    + ' pointer-events-none transition-all duration-200 px-5 py-3 rounded-xl shadow-2xl text-sm font-medium z-50';
  clearTimeout(el._t);
  el._t = setTimeout(() => {
    el.className = 'fixed bottom-6 right-1/2 translate-x-1/2 translate-y-4 opacity-0 pointer-events-none transition-all duration-200 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-5 py-3 rounded-xl shadow-2xl text-sm font-medium z-50';
  }, 2000);
}

async function api(path, body) {
  const opts = body
    ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    : {};
  const r = await fetch(path, opts);
  return r.json();
}

// ── Charts helpers ───────────────────────────────────────────────────────────
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }
function mkChart(id, cfg) {
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el) return;
  charts[id] = new Chart(el, cfg);
}
function chartColors() {
  const dark = document.documentElement.classList.contains('dark');
  return {
    grid:  dark ? '#1e293b' : '#e5e7eb',
    tick:  dark ? '#94a3b8' : '#64748b',
    label: dark ? '#e2e8f0' : '#374151',
  };
}

// ── Tab switching (hash-based, data-attribute driven) ───────────────────────
function showTab(name) {
  if (!TABS.includes(name)) name = 'overview';
  activeTab = name;

  document.querySelectorAll('[data-tab]').forEach(el => {
    el.classList.toggle('hidden', el.dataset.tab !== name);
  });
  document.querySelectorAll('[data-tab-button]').forEach(btn => {
    const on = btn.dataset.tabButton === name;
    btn.classList.toggle('active', on);
    btn.classList.toggle('text-brand-600', on);
    btn.classList.toggle('dark:text-brand-500', on);
    btn.classList.toggle('text-gray-500', !on);
    btn.classList.toggle('dark:text-slate-400', !on);
  });

  if (window.location.hash.slice(1) !== name) {
    history.replaceState(null, '', '#' + name);
  }

  renderActive();
}

function renderActive() {
  if (!D) return;
  const r = {
    overview: renderOverview,
    tasks:    renderTasks,
    habits:   renderHabits,
    leads:    renderLeads,
    expenses: renderExpenses,
    health:   renderHealth,
    stocks:   renderStocks,
  }[activeTab];
  if (r) r();
}

document.querySelectorAll('[data-tab-button]').forEach(btn => {
  btn.addEventListener('click', () => showTab(btn.dataset.tabButton));
});
window.addEventListener('hashchange', () => {
  const t = window.location.hash.slice(1);
  if (t && TABS.includes(t)) showTab(t);
});

// ── Overview ─────────────────────────────────────────────────────────────────
function renderOverview() {
  const s = D.leadsSummary || {};
  const statCard = (emoji, label, value, sub, color) => `
    <div class="card-lift bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4 shadow-sm cursor-pointer"
         onclick="showTab('${sub.tabId}')">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs uppercase tracking-wider text-gray-500 dark:text-slate-400 font-semibold">${esc(label)}</span>
        <span class="text-xl">${emoji}</span>
      </div>
      <div class="text-2xl font-bold ${color}">${value}</div>
      <div class="text-xs text-gray-500 dark:text-slate-400 mt-1">${esc(sub.text)}</div>
    </div>`;

  const totals = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 stagger">
      ${statCard('💼', 'לידים', fmt(s.total || 0), { tabId: 'leads', text: `השבוע: ${s.thisWeek||0} · חדשים: ${s.new||0}` }, 'text-brand-600 dark:text-brand-500')}
      ${statCard('📋', 'משימות פתוחות', fmt(D.tasks.open || 0), { tabId: 'tasks', text: `הושלמו היום: ${D.tasks.completed_today||0}` }, 'text-blue-600 dark:text-blue-400')}
      ${statCard('✅', 'הרגלים', `${D.habits.filter(h => h.doneToday).length}/${D.habits.length}`, { tabId: 'habits', text: 'בוצעו היום' }, 'text-emerald-600 dark:text-emerald-400')}
      ${statCard('💰', 'הוצאות החודש', '₪' + fmt(D.expenses.total_ils || 0), { tabId: 'expenses', text: `${D.expenses.count||0} רשומות` }, 'text-amber-600 dark:text-amber-400')}
    </div>`;

  // Health today summary (if any)
  const h = D.health;
  const healthBlock = h
    ? `<div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4 shadow-sm">
         <div class="flex items-center justify-between mb-3">
           <span class="text-xs uppercase tracking-wider text-gray-500 dark:text-slate-400 font-semibold">🏥 בריאות היום</span>
           <button onclick="showTab('health')" class="text-xs text-brand-600 dark:text-brand-500 hover:underline">פרטים ←</button>
         </div>
         ${meterRow('כאב', h.pain, 10, painColor(h.pain))}
         ${meterRow('מצב רוח', h.mood, 10, moodColor(h.mood))}
         ${meterRow('שינה', h.sleep, 12, '#6366F1', h.sleep + 'ש')}
       </div>`
    : `<div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4 shadow-sm cursor-pointer card-lift"
            onclick="showTab('health')">
         <div class="flex items-center justify-between">
           <span class="text-xs uppercase tracking-wider text-gray-500 dark:text-slate-400 font-semibold">🏥 בריאות היום</span>
           <span class="text-xs text-brand-600 dark:text-brand-500">דווח ←</span>
         </div>
         <div class="text-sm text-gray-500 dark:text-slate-400 mt-2">לא דווח היום — לחץ לתיעוד</div>
       </div>`;

  // Quick actions
  const quick = `
    <div class="flex flex-wrap gap-2">
      <button onclick="quickTask()" class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-lg text-sm font-medium transition">➕ הוסף משימה</button>
      <button onclick="showTab('habits')" class="px-4 py-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700 rounded-lg text-sm font-medium transition">✅ נהל הרגלים</button>
      <button onclick="showTab('expenses')" class="px-4 py-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700 rounded-lg text-sm font-medium transition">💰 הוסף הוצאה</button>
      <button onclick="showTab('health')" class="px-4 py-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700 rounded-lg text-sm font-medium transition">🏥 דווח בריאות</button>
    </div>`;

  // Recent activity feed
  const activity = buildActivityFeed();
  const recentBlock = `
    <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4 shadow-sm">
      <div class="text-xs uppercase tracking-wider text-gray-500 dark:text-slate-400 font-semibold mb-3">🕐 פעילות אחרונה</div>
      ${activity.length
        ? `<ul class="divide-y divide-gray-100 dark:divide-slate-800">${activity.map(a => `
            <li class="py-2 flex items-start gap-3 text-sm">
              <span class="text-lg">${a.icon}</span>
              <div class="flex-1 min-w-0">
                <div class="truncate">${esc(a.title)}</div>
                <div class="text-xs text-gray-500 dark:text-slate-400">${esc(a.subtitle)}</div>
              </div>
            </li>`).join('')}</ul>`
        : '<div class="text-sm text-gray-500 dark:text-slate-400">אין פעילות עדיין</div>'}
    </div>`;

  document.getElementById('overview-content').innerHTML = `
    ${totals}
    <div class="grid md:grid-cols-2 gap-3 mt-4">
      ${healthBlock}
      ${recentBlock}
    </div>
    <div class="mt-4">${quick}</div>
  `;
}

function buildActivityFeed() {
  const out = [];
  (D.tasks.openList || []).slice(0, 3).forEach(t => {
    out.push({ icon: '📋', title: t.text, subtitle: 'משימה פתוחה · ' + (t.priority === 'high' ? 'דחוף' : t.priority) });
  });
  (D.expenses.recent || []).slice(0, 3).forEach(e => {
    out.push({ icon: '💰', title: `${e.vendor || '—'} · ${e.currency === 'USD' ? '$' : '₪'}${fmt(e.amount)}`, subtitle: `${e.category || 'אחר'} · ${e.date || ''}` });
  });
  (D.leads || []).slice(0, 3).forEach(l => {
    out.push({ icon: '💼', title: l.name, subtitle: `${l.title} · ${new Date(l.createdAt).toLocaleDateString('he-IL')}` });
  });
  return out.slice(0, 10);
}

function meterRow(label, value, max, color, valText) {
  if (value == null) return '';
  const pct = Math.min(100, (value / max) * 100);
  return `
    <div class="flex items-center gap-3 mb-2 last:mb-0">
      <span class="text-xs text-gray-500 dark:text-slate-400 w-20 flex-shrink-0">${esc(label)}</span>
      <div class="flex-1 h-2 bg-gray-100 dark:bg-slate-800 rounded-full overflow-hidden">
        <div class="h-full rounded-full transition-all" style="width: ${pct}%; background: ${color};"></div>
      </div>
      <span class="text-xs font-semibold text-gray-700 dark:text-slate-200 w-8 text-left">${esc(valText || value)}</span>
    </div>`;
}

function painColor(v) { return v <= 3 ? '#10b981' : v <= 6 ? '#f59e0b' : '#ef4444'; }
function moodColor(v) { return v >= 7 ? '#10b981' : v >= 4 ? '#f59e0b' : '#ef4444'; }

// ── Tasks tab ────────────────────────────────────────────────────────────────
let tasksFilter = 'open';
function renderTasks() {
  const open = D.tasks.openList || [];
  const done = D.tasks.doneList || [];
  const bp = D.tasks.byPriority || { high: 0, medium: 0, low: 0 };

  const filterBtn = (key, label, count) => `
    <button onclick="setTasksFilter('${key}')"
      class="px-3 py-1.5 rounded-lg text-sm font-medium transition
             ${tasksFilter === key
               ? 'bg-brand-600 text-white'
               : 'bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-gray-700 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-700'}">
      ${esc(label)} <span class="text-xs opacity-75">(${count})</span>
    </button>`;

  const priorityBadge = p => {
    const map = {
      high:   'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400',
      medium: 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400',
      low:    'bg-gray-100 text-gray-600 dark:bg-slate-800 dark:text-slate-400',
    };
    const lbl = { high: 'דחוף', medium: 'רגיל', low: 'נמוך' };
    return `<span class="inline-flex items-center px-2 py-0.5 text-[10px] font-semibold rounded-full ${map[p] || map.medium}">${lbl[p] || p}</span>`;
  };

  const items = tasksFilter === 'done' ? done
              : tasksFilter === 'all'  ? [...open, ...done.map(t => ({ ...t, done: true }))]
              : open;

  const listHtml = items.length
    ? items.map(t => `
        <div class="flex items-center gap-3 bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl px-4 py-3 card-lift">
          <button onclick="toggleTask(${t.id})"
                  class="flex-shrink-0 w-5 h-5 rounded-md border-2 transition flex items-center justify-center
                         ${t.done
                           ? 'bg-brand-600 border-brand-600 text-white'
                           : 'border-gray-300 dark:border-slate-600 hover:border-brand-500'}">
            ${t.done ? '<svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ''}
          </button>
          <div class="flex-1 min-w-0">
            <div class="text-sm ${t.done ? 'line-through text-gray-400 dark:text-slate-500' : 'text-gray-900 dark:text-slate-100'}">${esc(t.text)}</div>
            <div class="flex items-center gap-2 mt-1">
              ${priorityBadge(t.priority)}
              <span class="text-[10px] text-gray-500 dark:text-slate-500">#${t.id}</span>
            </div>
          </div>
          ${!t.done ? `<button onclick="confirmDeleteTask(${t.id})" class="text-gray-400 hover:text-red-500 transition p-1" title="מחק">

               onkeydown="if(event.key==='Enter')submitNewTask()"/>

  document.getElementById('tasks-content').innerHTML = `

        <div class="text-xs text-gray-500 dark:text-slate-400">דחוף</div>
        <div class="text-xl font-bold text-red-600 dark:text-red-400">${bp.high}</div>
      </div>
      <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-3">
        <div class="text-xs text-gray-500 dark:text-slate-400">רגיל</div>
        <div class="text-xl font-bold text-amber-600 dark:text-amber-400">${bp.medium}</div>
      </div>
      <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-3">
        <div class="text-xs text-gray-500 dark:text-slate-400">נמוך</div>
        <div class="text-xl font-bold text-gray-600 dark:text-slate-400">${bp.low}</div>
      </div>
    </div>
    ${addForm}
    <div class="flex gap-2 mt-4 mb-3 overflow-x-auto no-scrollbar">
      ${filterBtn('open', 'פתוחות', open.length)}
      ${filterBtn('done', 'הושלמו', done.length)}
      ${filterBtn('all',  'הכל',   open.length + done.length)}
    </div>
    <div class="space-y-2">${listHtml}</div>
  `;
}
function setTasksFilter(f) { tasksFilter = f; renderTasks(); }

async function submitNewTask() {
  const inp = document.getElementById('new-task-input');
  const text = (inp.value || '').trim();
  if (!text) { toast('יש להזין טקסט', true); return; }
  const r = await api('/api/add-task', { text });
  if (r.ok) {
    inp.value = '';
    toast('✅ משימה נוספה');
    await reload();
    renderTasks();
  } else if (r.e === 'duplicate') {
    toast('⚠️ המשימה כבר קיימת', true);
  } else {
    toast('שגיאה: ' + (r.e || ''), true);
  }
}

async function toggleTask(id) {
  const r = await api('/api/complete-task', { id });
  if (r.ok) {
    toast('✓ עודכן');
    await reload();
    renderTasks();
  } else {
    toast('שגיאה', true);
  }
}

async function confirmDeleteTask(id) {
  if (!confirm('למחוק את המשימה?')) return;
  const r = await api('/api/delete-task', { id });
  if (r.ok) {
    toast('🗑️ נמחק');
    await reload();
    renderTasks();
  } else {
    toast('שגיאה: ' + (r.e || ''), true);
  }
}

function quickTask() {
  showTab('tasks');
  setTimeout(() => document.getElementById('new-task-input')?.focus(), 80);
}

// ── Habits tab ───────────────────────────────────────────────────────────────
function renderHabits() {
  const habits = D.habits || [];
  if (!habits.length) {
    document.getElementById('habits-content').innerHTML = `
      <div class="text-center py-12">
        <div class="text-5xl mb-3">✅</div>
        <div class="text-lg font-semibold mb-1">אין הרגלים עדיין</div>
        <div class="text-sm text-gray-500 dark:text-slate-400">הוסף דרך הבוט — למשל "תוסיף הרגל: שתיית מים"</div>
      </div>`;
    return;
  }

  const weekdayShort = ['א','ב','ג','ד','ה','ו','ש'];
  const cards = habits.map(h => {
    const dots = (h.week || []).map(w => {
      const d = new Date(w.date + 'T00:00:00');
      const isToday = w.date === new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Jerusalem' });
      const label = weekdayShort[d.getDay()];
      return `
        <div class="flex flex-col items-center gap-1">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-[11px] font-semibold transition
                      ${w.done ? 'bg-brand-600 text-white' : 'bg-gray-100 dark:bg-slate-800 text-gray-400 dark:text-slate-500'}
                      ${isToday ? 'ring-2 ring-brand-500 ring-offset-2 ring-offset-white dark:ring-offset-slate-950' : ''}">
            ${w.done ? '✓' : ''}
          </div>
          <span class="text-[10px] text-gray-500 dark:text-slate-500">${label}</span>
        </div>`;
    }).join('');

    return `
      <div class="card-lift bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4 shadow-sm">
        <div class="flex items-start justify-between mb-3">
          <div class="flex items-center gap-3">
            <span class="text-3xl">${esc(h.icon)}</span>
            <div>
              <div class="font-semibold">${esc(h.name)}</div>
              <div class="text-xs text-amber-600 dark:text-amber-400 mt-0.5 font-medium">${h.streak > 0 ? '🔥 ' + h.streak + ' ימים רצוף' : 'התחל היום!'}</div>
            </div>
          </div>
          <button onclick="logHabit(${h.id}, ${!h.doneToday})"
                  class="px-4 py-2 rounded-lg text-sm font-semibold transition
                         ${h.doneToday
                           ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400'
                           : 'bg-brand-600 hover:bg-brand-700 text-white'}">
            ${h.doneToday ? '✅ בוצע' : 'סמן'}
          </button>
        </div>
        <div class="flex justify-between gap-1 pt-3 border-t border-gray-100 dark:border-slate-800">${dots}</div>
      </div>`;
  }).join('');

  document.getElementById('habits-content').innerHTML = `
    <div class="grid sm:grid-cols-2 gap-3 stagger">${cards}</div>`;
}

async function logHabit(id, done) {
  const r = await api('/api/log-habit', { id, done });
  if (r.ok) {
    toast(done ? `✅ בוצע! 🔥 ${r.streak} ימים` : 'בוטל');
    await reload();
    renderHabits();
  } else {
    toast('שגיאה', true);
  }
}

    : `<div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4">
         <div class="text-xs uppercase tracking-wider text-gray-500 dark:text-slate-400 font-semibold mb-3">📊 קטגוריות</div>
         ${catList}
       </div>`;

  const addForm = `
    <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4 mt-4">
      <div class="text-xs uppercase tracking-wider text-gray-500 dark:text-slate-400 font-semibold mb-3">➕ הוצאה חדשה</div>
      <input id="exp-vendor" placeholder="ספק / חנות" class="w-full bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm mb-2 focus:border-brand-500 outline-none"/>

        <select id="exp-currency" class="bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:border-brand-500 outline-none">
          <option value="ILS">₪ ILS</option>
          <option value="USD">$ USD</option>
        </select>
        <select id="exp-cat" class="bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:border-brand-500 outline-none">
          <option value="other">📌 אחר</option>
          <option value="food">🍔 אוכל</option>
          <option value="tech">💻 טכנולוגיה</option>
          <option value="health">💊 בריאות</option>
          <option value="office">📦 משרד</option>

async function submitExpense() {
  const vendor   = document.getElementById('exp-vendor').value.trim();
  const amount   = parseFloat(document.getElementById('exp-amount').value);

  const category = document.getElementById('exp-cat').value;

    document.getElementById('exp-vendor').value = '';
    document.getElementById('exp-amount').value = '';
    await reload();
    renderExpenses();
  } else {
    toast('שגיאה', true);
  }
}

      <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-3">
        <div class="text-xs text-gray-500 dark:text-slate-400">ממוצע מצב רוח</div>
        <div class="text-2xl font-bold text-emerald-600 dark:text-emerald-400">${D.avgMood != null ? fmt(D.avgMood, 1) + '/10' : '—'}</div>
      </div>
    </div>`;

  const chartBlock = hasHistory
    ? `<div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4 mt-4">
         <div class="text-xs uppercase tracking-wider text-gray-500 dark:text-slate-400 font-semibold mb-3">📈 כאב ו-30 ימים</div>
         <div class="h-52"><canvas id="pain-chart"></canvas></div>
       </div>`
    : '';

  document.getElementById('health-content').innerHTML = stats + todayCard + chartBlock;

  if (hasHistory) {
    setTimeout(() => {
      const cc = chartColors();
      const labels = pain30.map(d => d.date.slice(5).replace('-', '/'));
      mkChart('pain-chart', {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'כאב',
            data: pain30.map(d => d.pain),
            borderColor: '#ef4444',
            backgroundColor: 'rgba(239,68,68,0.12)',
            tension: 0.35, spanGaps: true, pointRadius: 3, fill: true,
          }, {
            label: 'מצב רוח',
            data: pain30.map(d => d.mood),
            borderColor: '#10b981',
            backgroundColor: 'rgba(16,185,129,0.08)',
            tension: 0.35, spanGaps: true, pointRadius: 2,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: cc.label, boxWidth: 12, font: { size: 11 } } } },
          scales: {
            y: { min: 0, max: 10, ticks: { color: cc.tick, stepSize: 2 }, grid: { color: cc.grid } },
            x: { ticks: { color: cc.tick, font: { size: 9 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }, grid: { display: false } },
          }
        }
      });
    }, 30);
  }
}
function toggleHealthForm() {
  document.getElementById('health-update-form')?.classList.toggle('hidden');
}
async function submitHealth() {
  const pain  = +document.getElementById('pain-s').value;
  const mood  = +document.getElementById('mood-s').value;
  const sleep = +document.getElementById('sleep-s').value;
  const r = await api('/api/log-health', { pain, mood, sleep });
  if (r.ok) { toast('✅ דיווח נשמר'); await reload(); renderHealth(); }
  else      { toast('שגיאה', true); }
}

// ── Stocks tab ───────────────────────────────────────────────────────────────
function renderStocks() {
  const stocks = D.stocks || [];
  if (!stocks.length) {
    document.getElementById('stocks-content').innerHTML = `
      <div class="text-center py-12">
        <div class="text-5xl mb-3">📈</div>
        <div class="text-sm text-gray-500 dark:text-slate-400">אין מניות במעקב. הוסף דרך הבוט: "תעקוב אחרי NVDA ב-150$"</div>
      </div>`;
    return;
  }
  const triggered = stocks.filter(s => s.triggered);
  const trigBanner = triggered.length
    ? `<div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-3 mb-3 text-sm text-red-700 dark:text-red-400">
         🚨 ${triggered.length} התראות פעילות: ${triggered.map(s => esc(s.symbol)).join(', ')}
       </div>`
    : '';

  const rows = stocks.map(s => {
    const up   = (s.changePct || 0) >= 0;
    const sign = up ? '+' : '';
    const price = s.price != null ? `${s.currency === 'USD' ? '$' : ''}${fmt(s.price, 2)}` : '—';
    return `
      <div class="card-lift bg-white dark:bg-slate-900 border ${s.triggered ? 'border-red-300 dark:border-red-800' : 'border-gray-200 dark:border-slate-800'} rounded-xl p-4 shadow-sm flex items-center justify-between">
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <span class="font-bold text-base">${esc(s.symbol)}</span>
            ${s.triggered ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 font-semibold">🚨 התראה</span>' : ''}
          </div>
          <div class="text-xs text-gray-500 dark:text-slate-400 truncate">${esc((s.name || '').slice(0, 30))}</div>
          ${s.threshold != null
            ? `<div class="text-[10px] text-gray-500 dark:text-slate-400 mt-1">${s.direction === 'above' ? '↑' : '↓'} התראה ב-$${fmt(s.threshold)}</div>`
            : ''}
        </div>
        <div class="text-left">
          <div class="text-base font-bold">${price}</div>
          <span class="inline-block text-xs font-bold px-2 py-0.5 rounded mt-1 ${up ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'}">
            ${sign}${fmt(s.changePct, 2)}%
          </span>
        </div>
      </div>`;
  }).join('');

  document.getElementById('stocks-content').innerHTML = `
    ${trigBanner}
    <div class="text-[10px] text-gray-500 dark:text-slate-400 mb-3">מחירים חיים · מתרענן כל 30 שניות</div>
    <div class="space-y-2 stagger">${rows}</div>`;
}

// ── Data load + boot ─────────────────────────────────────────────────────────
async function reload() {
  try {
    D = await api('/api/dashboard');
    if (D.error) throw new Error(D.error);
    const ts = new Date(D.timestamp).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Jerusalem' });
    document.getElementById('ts').textContent = 'עודכן ' + ts;
    const on = !!D.supabase;
    document.getElementById('supabase-dot').className = 'inline-block w-1.5 h-1.5 rounded-full ' + (on ? 'bg-emerald-500' : 'bg-gray-400');
    document.getElementById('supabase-label').textContent = on ? 'מחובר' : 'JSON בלבד';
    renderActive();
  } catch (e) {
    document.getElementById('supabase-label').textContent = '⚠️ שגיאה: ' + e.message;
  }
}

// Boot
const initialTab = window.location.hash.slice(1);
if (TABS.includes(initialTab)) activeTab = initialTab;
showTab(activeTab);
reload();
setInterval(reload, 30000);

// Expose for inline onclick
window.showTab = showTab;
window.setTasksFilter = setTasksFilter;
window.setLeadsFilter = setLeadsFilter;
window.toggleTask = toggleTask;
window.confirmDeleteTask = confirmDeleteTask;
window.submitNewTask = submitNewTask;
window.quickTask = quickTask;
window.logHabit = logHabit;
window.submitExpense = submitExpense;
window.toggleHealthForm = toggleHealthForm;
window.submitHealth = submitHealth;
</script>
