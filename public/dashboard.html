<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שילובילו — לוח בקרה</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Heebo', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              50:  '#EEF2FF',
              100: '#E0E7FF',
              500: '#6366F1',
              600: '#4F46E5',
              700: '#4338CA',
            },
          },
        },
      },
    };
  </script>

  <style>
    html, body { font-family: 'Heebo', system-ui, sans-serif; }
    * { -webkit-tap-highlight-color: transparent; }

    /* Card hover lift */
    .card-lift { transition: transform .18s ease, box-shadow .18s ease; }
    .card-lift:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }

    /* Tab button underline animation */
    .tab-btn { position: relative; transition: color .18s ease; }
    .tab-btn::after {
      content: ''; position: absolute; bottom: -1px; left: 12%; right: 12%;
      height: 2px; background: currentColor; transform: scaleX(0);
      transition: transform .22s ease; border-radius: 2px;
    }
    .tab-btn.active::after { transform: scaleX(1); }

    /* Fade-in on load */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp .35s ease both; }

    /* Staggered cards */
    .stagger > * { animation: fadeUp .4s ease both; }
    .stagger > *:nth-child(1) { animation-delay: .02s; }
    .stagger > *:nth-child(2) { animation-delay: .08s; }
    .stagger > *:nth-child(3) { animation-delay: .14s; }
    .stagger > *:nth-child(4) { animation-delay: .20s; }
    .stagger > *:nth-child(5) { animation-delay: .26s; }
    .stagger > *:nth-child(6) { animation-delay: .32s; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #E5E7EB 25%, #F3F4F6 50%, #E5E7EB 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: .5rem;
    }
    .dark .skeleton { background: linear-gradient(90deg, #374151 25%, #4B5563 50%, #374151 75%); background-size: 200% 100%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Smooth scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }

    /* Slider (range) */
    input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; outline: none; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
      background: #4F46E5; cursor: pointer; border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    .slider-pain  { background: linear-gradient(90deg, #34d399, #fbbf24, #ef4444); }
    .slider-mood  { background: linear-gradient(90deg, #ef4444, #fbbf24, #34d399); }
    .slider-sleep { background: linear-gradient(90deg, #818cf8, #4F46E5); }

    /* Hide scrollbar for horizontal tabs */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Premium animations ────────────────────────────────────────────────── */
    @keyframes fadeSlideUp   { from { opacity:0; transform:translateY(8px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeSlideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scaleIn       { from { opacity:0; transform:scale(.96); }       to { opacity:1; transform:scale(1); } }
    @keyframes pulseDot      { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.7; transform:scale(1.25); } }
    @keyframes confetti      { 0% { transform:translateY(0) rotate(0);      opacity:1; }
                               100% { transform:translateY(100vh) rotate(720deg); opacity:0; } }
    @keyframes checkmarkDraw { from { stroke-dashoffset:24; } to { stroke-dashoffset:0; } }
    @keyframes shake         { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-4px); } 75% { transform:translateX(4px); } }
    @keyframes toastSlideIn  { from { opacity:0; transform:translateY(-12px) scale(.95); }
                               to   { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes toastProgress { from { transform:scaleX(1); } to { transform:scaleX(0); } }

    .anim-fade-up    { animation: fadeSlideUp   .3s ease both; }
    .anim-fade-down  { animation: fadeSlideDown .3s ease both; }
    .anim-scale-in   { animation: scaleIn       .22s ease both; }
    .anim-shake      { animation: shake         .32s ease both; }
    .pulse-dot       { animation: pulseDot      2s ease-in-out infinite; }

    /* Ripple effect on any .btn-ripple */
    .btn-ripple { position: relative; overflow: hidden; }
    .btn-ripple::after {
      content: ''; position: absolute; inset: 0; margin: auto; width: 8px; height: 8px; border-radius: 50%;
      background: currentColor; opacity: 0; pointer-events: none; transform: scale(0);
    }
    .btn-ripple:active::after { animation: rippleOut .5s ease-out; }
    @keyframes rippleOut { from { transform: scale(0); opacity: .3; } to { transform: scale(25); opacity: 0; } }

    /* Active-tab micro pulse */
    .tab-btn.active { animation: scaleIn .18s ease both; }

    /* Global search modal */
    .modal-backdrop { background: rgba(0,0,0,.55); backdrop-filter: blur(4px); animation: fadeSlideDown .2s ease both; }
    .modal-panel    { animation: scaleIn .22s ease both; }

    /* Toast 2.0 */
    #toast-stack { position: fixed; top: 1rem; right: 1rem; display: flex; flex-direction: column; gap: .5rem; z-index: 60; max-width: 360px; width: calc(100% - 2rem); pointer-events: none; }
    .toast-item { pointer-events: auto; position: relative; overflow: hidden; padding: .75rem 1rem; border-radius: .75rem; box-shadow: 0 20px 40px -10px rgba(0,0,0,.25); animation: toastSlideIn .25s ease both; display: flex; align-items: flex-start; gap: .6rem; font-size: .875rem; font-weight: 500; }
    .toast-item .toast-progress { position: absolute; bottom: 0; right: 0; left: 0; height: 3px; background: rgba(255,255,255,.55); transform-origin: right; animation: toastProgress var(--dur, 4s) linear forwards; }
    .toast-item.paused .toast-progress { animation-play-state: paused; }
    .toast-success { background: #059669; color: #fff; }
    .toast-error   { background: #dc2626; color: #fff; }
    .toast-info    { background: #0f172a; color: #fff; }
    .toast-warning { background: #d97706; color: #fff; }
    .dark .toast-info { background: #e2e8f0; color: #0f172a; }
    .dark .toast-info .toast-progress { background: rgba(15,23,42,.4); }

    /* Checkmark SVG draw */
    .check-draw path { stroke-dasharray: 24; stroke-dashoffset: 24; animation: checkmarkDraw .35s ease forwards; }

    /* Confetti piece */
    .confetti-piece { position: fixed; top: -20px; width: 8px; height: 12px; border-radius: 2px; pointer-events: none; z-index: 9999; animation: confetti 2.5s ease-in forwards; }

    /* Focus mode */
    body.focus-mode > header nav,
    body.focus-mode > header .status-line { display: none !important; }
    body.focus-mode main  { padding-top: 1.5rem; }
    body.focus-mode .focus-exit-hint {
      position: fixed; bottom: 1rem; left: 1rem; font-size: .72rem; color: #94a3b8;
      background: rgba(255,255,255,.7); padding: .35rem .6rem; border-radius: .5rem; backdrop-filter: blur(8px);
    }
    .dark body.focus-mode .focus-exit-hint { background: rgba(15,23,42,.7); color: #cbd5e1; }
    .focus-exit-hint { display: none; }
    body.focus-mode .focus-exit-hint { display: block; }

    /* Tabular numbers for LTR numeric spans (prevents digit wobble in RTL) */
    .tabular-nums { font-variant-numeric: tabular-nums; }

    /* Suggestion chip */
    .chip-btn { transition: transform .15s ease, background .15s ease; }
    .chip-btn:active { transform: scale(.95); }

    /* Inline delete confirm */
    .inline-confirm { animation: fadeSlideDown .18s ease both; }

    /* Kbd visual */
    kbd { display:inline-block; padding:.1rem .4rem; border-radius:.3rem; background:#e2e8f0; color:#0f172a; font-size:.7rem; font-family: ui-monospace, Menlo, monospace; border: 1px solid #cbd5e1; min-width: 1.5rem; text-align: center; }
    .dark kbd { background:#1e293b; color:#e2e8f0; border-color:#334155; }

    /* Habit streak tooltip */
    .streak-tip { position: relative; }
    .streak-tip:hover::after {
      content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); right: 50%; transform: translateX(50%);
      background: #0f172a; color: #fff; padding: .3rem .6rem; border-radius: .4rem; font-size: .7rem; white-space: nowrap; z-index: 20;
      animation: fadeSlideDown .18s ease both;
    }
    .dark .streak-tip:hover::after { background: #e2e8f0; color: #0f172a; }
  </style>
</head>

<body class="bg-gray-50 dark:bg-slate-950 text-gray-900 dark:text-slate-100 min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/80 dark:bg-slate-900/80 backdrop-blur border-b border-gray-200 dark:border-slate-800">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🚀</span>
        <div>
          <h1 class="text-base sm:text-lg font-bold leading-tight">שילובילו — לוח בקרה</h1>
          <div class="status-line flex items-center gap-2 text-[10px] sm:text-xs text-gray-500 dark:text-slate-400">
            <span id="supabase-dot" class="inline-block w-1.5 h-1.5 rounded-full bg-gray-400"></span>
            <span id="supabase-label">מתחבר...</span>
            <span>·</span>
            <span id="ts">—</span>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <button onclick="openSearchModal()" class="hidden sm:flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border border-gray-200 dark:border-slate-700 hover:bg-gray-100 dark:hover:bg-slate-800 text-gray-500 dark:text-slate-400 text-xs transition" title="חיפוש (Ctrl+K)">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 110-15 7.5 7.5 0 010 15z"/></svg>
          <span>חיפוש</span>
          <kbd class="hidden md:inline">⌘K</kbd>
        </button>
        <button onclick="toggleFocusMode()" id="focus-toggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800 transition" title="מצב פוקוס (F)">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </button>
        <button onclick="showShortcutsModal()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800 transition text-gray-500 dark:text-slate-400" title="קיצורי מקלדת (?)">
          <span class="text-sm font-bold">?</span>

        <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800 transition" title="מצב בהיר/כהה">
          <span class="dark:hidden">🌙</span>

        <button onclick="logout()"
                class="p-2 rounded-lg hover:bg-red-500/10 text-red-500 dark:text-red-400 transition"
                title="יציאה מהדשבורד">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <nav class="max-w-6xl mx-auto px-2 overflow-x-auto no-scrollbar">
      <div class="flex gap-1 text-sm font-medium" role="tablist">
        <button class="tab-btn active px-4 py-3 whitespace-nowrap text-brand-600 dark:text-brand-500" data-tab-button="overview">📊 סקירה</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="tasks">📋 משימות</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="habits">✅ הרגלים</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="leads">💼 לידים</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="expenses">💰 הוצאות</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="health">🏥 בריאות</button>
        <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100" data-tab-button="stocks">📈 מניות</button>
      </div>

  </header>

  <!-- Main content -->
  <main class="max-w-6xl mx-auto px-4 py-6 pb-24">
    <section data-tab="overview"><div id="overview-content" class="fade-up"><div class="grid grid-cols-2 md:grid-cols-4 gap-3"><div class="skeleton h-24"></div><div class="skeleton h-24"></div><div class="skeleton h-24"></div><div class="skeleton h-24"></div></div></div></section>
    <section data-tab="tasks" class="hidden"><div id="tasks-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
    <section data-tab="habits" class="hidden"><div id="habits-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
    <section data-tab="leads" class="hidden"><div id="leads-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
    <section data-tab="expenses" class="hidden"><div id="expenses-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
    <section data-tab="health" class="hidden"><div id="health-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
    <section data-tab="stocks" class="hidden"><div id="stocks-content" class="fade-up"><div class="skeleton h-32"></div></div></section>
  </main>

  <!-- Toast 2.0 stack -->
  <div id="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <!-- Focus-mode exit hint -->
  <div class="focus-exit-hint">💡 לחץ <kbd>F</kbd> או <kbd>Esc</kbd> ליציאה ממצב פוקוס</div>

  <!-- Modal mount point (search / shortcuts) -->
  <div id="modal-mount"></div>

<script>
'use strict';

// ── Telegram WebApp boot ─────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── State ────────────────────────────────────────────────────────────────────
let D = null;
let activeTab = 'overview';
const charts = {};
const TABS = ['overview','tasks','habits','leads','expenses','health','stocks'];

// ── Theme ────────────────────────────────────────────────────────────────────
(function initTheme() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const dark = saved ? saved === 'dark' : prefersDark;
  document.documentElement.classList.toggle('dark', dark);
})();
document.getElementById('theme-toggle').addEventListener('click', () => {
  const root = document.documentElement;
  root.classList.toggle('dark');
  localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
  // Re-render current tab so chart colors update
  renderActive();
});

// ── Utilities ────────────────────────────────────────────────────────────────
function fmt(n, d = 0) {
  if (n == null || isNaN(n)) return '—';
  return (+n).toLocaleString('he-IL', { maximumFractionDigits: d });
}
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
// ── Toast 2.0 — stack of max 3 with progress bar, hover-pause, queue ─────────
const TOAST_ICONS = { success: '✓', error: '✗', info: 'ℹ', warning: '⚠' };
const toastQueue = [];
let activeToasts = 0;
function showToast(msg, type = 'info', duration = 4000) {
  if (activeToasts >= 3) { toastQueue.push({ msg, type, duration }); return; }
  activeToasts++;

  const stack = document.getElementById('toast-stack');
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  if (type === 'error') el.classList.add('anim-shake');
  el.style.setProperty('--dur', duration + 'ms');
  el.innerHTML = `
    <span class="text-lg leading-none flex-shrink-0">${TOAST_ICONS[type] || 'ℹ'}</span>
    <span class="flex-1 min-w-0">${esc(msg)}</span>
    <span class="toast-progress"></span>`;
  stack.appendChild(el);

  const dismiss = () => {
    if (!el.isConnected) return;
    el.style.transition = 'opacity .2s ease, transform .2s ease';
    el.style.opacity = '0';
    el.style.transform = 'translateY(-6px)';
    setTimeout(() => {
      el.remove();
      activeToasts = Math.max(0, activeToasts - 1);
      if (toastQueue.length) {
        const next = toastQueue.shift();
        showToast(next.msg, next.type, next.duration);
      }
    }, 200);
  };
  let timer = setTimeout(dismiss, duration);
  el.addEventListener('mouseenter', () => { el.classList.add('paused'); clearTimeout(timer); });
  el.addEventListener('mouseleave', () => { el.classList.remove('paused'); timer = setTimeout(dismiss, 1500); });
  el.addEventListener('click',      () => { clearTimeout(timer); dismiss(); });
}
// Legacy shim — keep existing callers working. Boolean second arg → 'error'.
function toast(msg, isErr = false) { showToast(msg, isErr ? 'error' : 'success', 3500); }

async function api(path, body) {
  const opts = body
    ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(body) }
    : { credentials: 'same-origin' };
  const r = await fetch(path, opts);
  if (r.status === 401) {
    window.location.href = '/dashboard';
    return null;
  }
  return r.json();
}

async function logout() {
  if (!confirm('להתנתק מהדשבורד?')) return;
  try {
    await fetch('/api/logout', { method: 'POST', credentials: 'same-origin' });
  } catch {}
  window.location.href = '/dashboard';
}
window.logout = logout;

// ── Charts helpers ───────────────────────────────────────────────────────────
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }
function mkChart(id, cfg) {
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el) return;
  charts[id] = new Chart(el, cfg);
}
function chartColors() {
  const dark = document.documentElement.classList.contains('dark');
  return {
    grid:  dark ? '#1e293b' : '#e5e7eb',
    tick:  dark ? '#94a3b8' : '#64748b',
    label: dark ? '#e2e8f0' : '#374151',
  };
}

// ── Tab switching (hash-based, data-attribute driven) ───────────────────────
function showTab(name) {
  if (!TABS.includes(name)) name = 'overview';
  activeTab = name;

  document.querySelectorAll('[data-tab]').forEach(el => {
    el.classList.toggle('hidden', el.dataset.tab !== name);
  });
  document.querySelectorAll('[data-tab-button]').forEach(btn => {
    const on = btn.dataset.tabButton === name;
    btn.classList.toggle('active', on);
    btn.classList.toggle('text-brand-600', on);
    btn.classList.toggle('dark:text-brand-500', on);
    btn.classList.toggle('text-gray-500', !on);
    btn.classList.toggle('dark:text-slate-400', !on);
  });

  if (window.location.hash.slice(1) !== name) {
    history.replaceState(null, '', '#' + name);
  }

  renderActive();
}

function renderActive() {
  if (!D) return;
  const r = {
    overview: renderOverview,
    tasks:    renderTasks,
    habits:   renderHabits,
    leads:    renderLeads,
    expenses: renderExpenses,
    health:   renderHealth,
    stocks:   renderStocks,
  }[activeTab];
  if (r) r();
}

document.querySelectorAll('[data-tab-button]').forEach(btn => {
  btn.addEventListener('click', () => showTab(btn.dataset.tabButton));
});
window.addEventListener('hashchange', () => {
  const t = window.location.hash.slice(1);
  if (t && TABS.includes(t)) showTab(t);
});

// ── Overview ─────────────────────────────────────────────────────────────────
function renderOverview() {
  const s = D.leadsSummary || {};

  // Greeting banner (time-aware)
  const g = getGreeting();
  const greetingBanner = `
    <div class="bg-gradient-to-br from-brand-50 to-indigo-50 dark:from-brand-950/40 dark:to-indigo-950/40 border border-brand-200/60 dark:border-brand-900 rounded-xl p-4 mb-4 anim-fade-up flex items-center gap-3">
      <div class="text-4xl">${g.emoji}</div>
      <div class="flex-1 min-w-0">
        <div class="text-lg font-bold">${esc(g.text)}</div>
        <div class="text-xs text-gray-500 dark:text-slate-400">${esc(g.sub)}</div>
      </div>
    </div>`;

  // Sparklines from available history
  const painHist  = (D.pain30 || []).slice(-14).map(d => d.pain).filter(v => v != null);

            onclick="showTab('health')">
         <div class="flex items-center justify-between">
           <span class="text-xs uppercase tracking-wider text-gray-500 dark:text-slate-400 font-semibold">🏥 בריאות היום</span>
           <span class="text-xs text-brand-600 dark:text-brand-500">דווח ←</span>
         </div>
         <div class="text-sm text-gray-500 dark:text-slate-400 mt-2">לא דווח היום — לחץ לתיעוד</div>

  // Quick actions

      <button onclick="showTab('habits')" class="px-4 py-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700 rounded-lg text-sm font-medium transition">✅ נהל הרגלים</button>
      <button onclick="showTab('expenses')" class="px-4 py-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700 rounded-lg text-sm font-medium transition">💰 הוסף הוצאה</button>

function buildActivityFeed() {
  const out = [];
  (D.tasks.openList || []).slice(0, 3).forEach(t => {
    out.push({ icon: '📋', title: t.text, subtitle: 'משימה פתוחה · ' + (t.priority === 'high' ? 'דחוף' : t.priority) });
  });
  (D.expenses.recent || []).slice(0, 3).forEach(e => {
    out.push({ icon: '💰', title: `${e.vendor || '—'} · ${e.currency === 'USD' ? '$' : '₪'}${fmt(e.amount)}`, subtitle: `${e.category || 'אחר'} · ${e.date || ''}` });
  });
  (D.leads || []).slice(0, 3).forEach(l => {
    out.push({ icon: '💼', title: l.name, subtitle: `${l.title} · ${new Date(l.createdAt).toLocaleDateString('he-IL')}` });
  });
  return out.slice(0, 10);
}

function meterRow(label, value, max, color, valText) {
  if (value == null) return '';
  const pct = Math.min(100, (value / max) * 100);
  return `
    <div class="flex items-center gap-3 mb-2 last:mb-0">
      <span class="text-xs text-gray-500 dark:text-slate-400 w-20 flex-shrink-0">${esc(label)}</span>
      <div class="flex-1 h-2 bg-gray-100 dark:bg-slate-800 rounded-full overflow-hidden">
        <div class="h-full rounded-full transition-all" style="width: ${pct}%; background: ${color};"></div>
      </div>
      <span class="text-xs font-semibold text-gray-700 dark:text-slate-200 w-8 text-left">${esc(valText || value)}</span>
    </div>`;
}

function painColor(v) { return v <= 3 ? '#10b981' : v <= 6 ? '#f59e0b' : '#ef4444'; }
function moodColor(v) { return v >= 7 ? '#10b981' : v >= 4 ? '#f59e0b' : '#ef4444'; }

// ── Tasks tab ────────────────────────────────────────────────────────────────
let tasksFilter = 'open';
function renderTasks() {
  const open = D.tasks.openList || [];
  const done = D.tasks.doneList || [];
  const bp = D.tasks.byPriority || { high: 0, medium: 0, low: 0 };

  const filterBtn = (key, label, count) => `
    <button onclick="setTasksFilter('${key}')"
      class="px-3 py-1.5 rounded-lg text-sm font-medium transition
             ${tasksFilter === key
               ? 'bg-brand-600 text-white'
               : 'bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-gray-700 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-700'}">
      ${esc(label)} <span class="text-xs opacity-75">(${count})</span>
    </button>`;

  const priorityBadge = p => {
    const map = {
      high:   'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400',
      medium: 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400',
      low:    'bg-gray-100 text-gray-600 dark:bg-slate-800 dark:text-slate-400',
    };
    const lbl = { high: 'דחוף', medium: 'רגיל', low: 'נמוך' };
    return `<span class="inline-flex items-center px-2 py-0.5 text-[10px] font-semibold rounded-full ${map[p] || map.medium}">${lbl[p] || p}</span>`;
  };

  const items = tasksFilter === 'done' ? done
              : tasksFilter === 'all'  ? [...open, ...done.map(t => ({ ...t, done: true }))]
              : open;

  const listHtml = items.length
    ? items.map(t => `
        <div class="flex items-center gap-3 bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl px-4 py-3 card-lift">
          <button onclick="toggleTask(${t.id})"
                  class="flex-shrink-0 w-5 h-5 rounded-md border-2 transition flex items-center justify-center
                         ${t.done
                           ? 'bg-brand-600 border-brand-600 text-white'
                           : 'border-gray-300 dark:border-slate-600 hover:border-brand-500'}">
            ${t.done ? '<svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ''}
          </button>
          <div class="flex-1 min-w-0">
            <div class="text-sm ${t.done ? 'line-through text-gray-400 dark:text-slate-500' : 'text-gray-900 dark:text-slate-100'}">${esc(t.text)}</div>
            <div class="flex items-center gap-2 mt-1">
              ${priorityBadge(t.priority)}
              <span class="text-[10px] text-gray-500 dark:text-slate-500">#${t.id}</span>
            </div>
          </div>
          ${!t.done ? `<button onclick="confirmDeleteTask(${t.id})" class="text-gray-400 hover:text-red-500 transition p-1" title="מחק">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/></svg>
          </button>` : ''}
        </div>`).join('')
    : renderEmptyState('tasks');

  // Add task form
  const addForm = `
    <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4 shadow-sm">
      <div class="flex gap-2">
        <input id="new-task-input" placeholder="משימה חדשה (התחל ב-! לדחיפות גבוהה)"
               class="flex-1 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg px-4 py-2.5 text-sm outline-none focus:border-brand-500 dark:focus:border-brand-500 transition"
               onkeydown="if(event.key==='Enter')submitNewTask()"/>
        <button onclick="submitNewTask()" class="px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg text-sm font-medium transition">הוסף</button>
      </div>
    </div>`;

  document.getElementById('tasks-content').innerHTML = `
    <div class="grid grid-cols-3 gap-3 mb-4 stagger">
      <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-3">
        <div class="text-xs text-gray-500 dark:text-slate-400">דחוף</div>
        <div class="text-xl font-bold text-red-600 dark:text-red-400">${bp.high}</div>
      </div>
      <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-3">
        <div class="text-xs text-gray-500 dark:text-slate-400">רגיל</div>
        <div class="text-xl font-bold text-amber-600 dark:text-amber-400">${bp.medium}</div>
      </div>
      <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-3">
        <div class="text-xs text-gray-500 dark:text-slate-400">נמוך</div>
        <div class="text-xl font-bold text-gray-600 dark:text-slate-400">${bp.low}</div>
      </div>
    </div>
    ${addForm}
    <div class="flex gap-2 mt-4 mb-3 overflow-x-auto no-scrollbar">
      ${filterBtn('open', 'פתוחות', open.length)}
      ${filterBtn('done', 'הושלמו', done.length)}
      ${filterBtn('all',  'הכל',   open.length + done.length)}
    </div>
    <div class="space-y-2">${listHtml}</div>
  `;
}
function setTasksFilter(f) { tasksFilter = f; renderTasks(); }

async function submitNewTask() {
  const inp = document.getElementById('new-task-input');
  const text = (inp.value || '').trim();
  if (!text) { toast('יש להזין טקסט', true); return; }
  const r = await api('/api/add-task', { text });
  if (r.ok) {
    inp.value = '';
    toast('✅ משימה נוספה');
    await reload();
    renderTasks();
  } else if (r.e === 'duplicate') {
    toast('⚠️ המשימה כבר קיימת', true);
  } else {
    toast('שגיאה: ' + (r.e || ''), true);
  }
}

async function toggleTask(id) {
  const r = await api('/api/complete-task', { id });
  if (r.ok) {
    toast('✓ עודכן');
    await reload();
    renderTasks();
  } else {
    toast('שגיאה', true);
  }
}

async function confirmDeleteTask(id) {
  if (!confirm('למחוק את המשימה?')) return;
  const r = await api('/api/delete-task', { id });
  if (r.ok) {
    toast('🗑️ נמחק');
    await reload();
    renderTasks();
  } else {
    toast('שגיאה: ' + (r.e || ''), true);
  }
}

function quickTask() {
  showTab('tasks');
  setTimeout(() => document.getElementById('new-task-input')?.focus(), 80);
}

// ── Habits tab ───────────────────────────────────────────────────────────────
function renderHabits() {
  const habits = D.habits || [];
  if (!habits.length) {
    document.getElementById('habits-content').innerHTML = renderEmptyState('habits');
    return;
  }

  const weekdayShort = ['א','ב','ג','ד','ה','ו','ש'];
  const cards = habits.map(h => {
    const dots = (h.week || []).map(w => {
      const d = new Date(w.date + 'T00:00:00');
      const isToday = w.date === new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Jerusalem' });
      const label = weekdayShort[d.getDay()];
      return `
        <div class="flex flex-col items-center gap-1">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-[11px] font-semibold transition
                      ${w.done ? 'bg-brand-600 text-white' : 'bg-gray-100 dark:bg-slate-800 text-gray-400 dark:text-slate-500'}
                      ${isToday ? 'ring-2 ring-brand-500 ring-offset-2 ring-offset-white dark:ring-offset-slate-950' : ''}">
            ${w.done ? '✓' : ''}
          </div>
          <span class="text-[10px] text-gray-500 dark:text-slate-500">${label}</span>
        </div>`;
    }).join('');

    return `
      <div class="card-lift bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-xl p-4 shadow-sm">
        <div class="flex items-start justify-between mb-3">
          <div class="flex items-center gap-3">
            <span class="text-3xl">${esc(h.icon)}</span>
            <div>
              <div class="font-semibold">${esc(h.name)}</div>
              <div class="text-xs text-amber-600 dark:text-amber-400 mt-0.5 font-medium">${h.streak > 0 ? '🔥 ' + h.streak + ' ימים רצוף' : 'התחל היום!'}</div>
            </div>
          </div>
          <button onclick="logHabit(${h.id}, ${!h.doneToday})"
                  class="px-4 py-2 rounded-lg text-sm font-semibold transition
                         ${h.doneToday
                           ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400'
                           : 'bg-brand-600 hover:bg-brand-700 text-white'}">
            ${h.doneToday ? '✅ בוצע' : 'סמן'}
          </button>
        </div>
        <div class="flex justify-between gap-1 pt-3 border-t border-gray-100 dark:border-slate-800">${dots}</div>
      </div>`;
  }).join('');

  document.getElementById('habits-content').innerHTML = `
    <div class="grid sm:grid-cols-2 gap-3 stagger">${cards}</div>`;
  maybeCelebrateHabits();
}

async function logHabit(id, done) {
  const r = await api('/api/log-habit', { id, done });
  if (r.ok) {
    toast(done ? `✅ בוצע! 🔥 ${r.streak} ימים` : 'בוטל');
    await reload();
    renderHabits();
  } else {
    toast('שגיאה', true);
  }
}

// ── Premium utilities ────────────────────────────────────────────────────────
function countUp(el, target, duration = 800) {
  if (!el) return;
  const start = performance.now();
  target = Number(target) || 0;
  (function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = String(Math.round(target * eased));
    if (p < 1) requestAnimationFrame(step);
  })(performance.now());
}

function animateCountUps(root) {
  (root || document).querySelectorAll('[data-countup]').forEach(el => {
    const v = parseInt(el.dataset.countup, 10);
    if (!isNaN(v)) countUp(el, v, 800);
  });
}

function sparkline(values, color = '#6366F1', height = 28) {
  const arr = (values || []).filter(v => v != null);
  if (arr.length < 2) return '';
  const w = 100, h = height;
  const max = Math.max(...arr, 1);
  const min = Math.min(...arr, 0);
  const range = Math.max(max - min, 1);
  const pts = arr.map((v, i) => {
    const x = (i / (arr.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px" aria-hidden="true">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />
  </svg>`;
}

function trendArrow(current, previous) {
  if (previous == null || previous === 0) return '';
  const diff = current - previous;
  const pct  = Math.round((diff / Math.abs(previous)) * 100);
  if (pct === 0) return '<span class="text-gray-500 text-xs">→ יציב</span>';
  if (pct > 0)  return `<span class="text-emerald-500 text-xs" dir="ltr">↑ +${pct}%</span>`;
  return `<span class="text-red-500 text-xs" dir="ltr">↓ ${pct}%</span>`;
}

function isThisWeek(iso) {
  if (!iso) return false;
  const d = new Date(iso);
  if (isNaN(d)) return false;
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  return diffDays < 7 && diffDays >= 0;
}

function getGreeting() {
  const hour = new Date().getHours();
  if (hour >= 5  && hour < 11) return { text: 'בוקר טוב, שילה', emoji: '☀️', sub: 'מה יש לך היום?' };
  if (hour >= 11 && hour < 16) return { text: 'יום טוב, שילה',  emoji: '🌤️', sub: 'איך ההתקדמות?' };
  if (hour >= 16 && hour < 21) return { text: 'ערב טוב, שילה', emoji: '🌅', sub: 'סיכום היום?' };
  return { text: 'לילה טוב, שילה', emoji: '🌙', sub: 'לנוח או לתכנן?' };
}

// ── Auto-insights ────────────────────────────────────────────────────────────
function generateInsights() {
  if (!D) return [];
  const insights = [];

  // Tasks: completed this week
  const doneThisWeek = (D.tasks?.doneList || [])
    .filter(t => t.doneAt && isThisWeek(t.doneAt)).length;
  if (doneThisWeek >= 5) {
    insights.push({ icon: '🎯', text: `השלמת ${doneThisWeek} משימות השבוע — כל הכבוד!`, type: 'success' });
  }

  // Habits: top streak
  const topStreak = Math.max(0, ...((D.habits || []).map(h => h.streak || 0)));
  if (topStreak >= 7) {
    insights.push({ icon: '🔥', text: `${topStreak} ימי רצף בהרגל שלך — שיא אישי!`, type: 'success' });
  }

  // Health: gap
  const hist = D.healthHistory || [];
  if (hist.length >= 3) {
    const last3 = hist.slice(-3);
    const allMissing = last3.every(d => d.pain == null && d.mood == null);
    if (allMissing) {
      insights.push({ icon: '🩺', text: 'לא דיווחת על בריאות 3 ימים — הכל בסדר?', type: 'warning', cta: { label: 'דווח עכשיו', tab: 'health' } });
    }
  }

  // Leads: new this week
  const newLeadsWk = (D.leads || []).filter(l => l.status === 'new' && isThisWeek(l.createdAt)).length;
  if (newLeadsWk >= 2) {
    insights.push({ icon: '🎯', text: `${newLeadsWk} לידים חדשים השבוע — בדוק אותם`, type: 'info', cta: { label: 'פתח לידים', tab: 'leads' } });
  }

  // Pain high recently
  const recentPains = (D.pain30 || []).slice(-7).map(d => d.pain).filter(v => v != null);
  if (recentPains.length >= 3) {
    const avg = recentPains.reduce((a, b) => a + b, 0) / recentPains.length;
    if (avg >= 7) insights.push({ icon: '⚠️', text: `ממוצע כאב השבוע גבוה (${avg.toFixed(1)}/10) — שקול מנוחה`, type: 'warning' });
  }

  return insights.slice(0, 3);
}

// ── Confetti on all-habits-done ──────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#6366F1', '#EC4899', '#10B981', '#F59E0B', '#8B5CF6', '#06B6D4'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.background = colors[i % colors.length];
    p.style.animationDuration = (1.8 + Math.random() * 1.8) + 's';
    p.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 5000);
  }
}
function maybeCelebrateHabits() {
  const habits = D?.habits || [];
  if (!habits.length) return;
  const allDone = habits.every(h => h.doneToday);
  if (!allDone) return;
  const today = new Date().toISOString().slice(0, 10);
  if (sessionStorage.getItem('confettiShownDay') === today) return;
  sessionStorage.setItem('confettiShownDay', today);
  launchConfetti();
  showToast('🎉 סיימת את כל ההרגלים היום! מצוין.', 'success', 5500);
}

// ── Focus mode ───────────────────────────────────────────────────────────────
function toggleFocusMode() {
  const on = !document.body.classList.contains('focus-mode');
  document.body.classList.toggle('focus-mode', on);
  localStorage.setItem('focusMode', on ? '1' : '0');
  if (on) showToast('מצב פוקוס — לחץ F או Esc לצאת', 'info', 3000);
}
(function restoreFocus() {
  if (localStorage.getItem('focusMode') === '1') document.body.classList.add('focus-mode');
})();

// ── Global search modal (Ctrl+K) ─────────────────────────────────────────────
function closeModal() {
  const m = document.getElementById('modal-mount');
  if (m) m.innerHTML = '';
}
function openSearchModal() {
  const mount = document.getElementById('modal-mount');
  mount.innerHTML = `
    <div class="fixed inset-0 z-50 modal-backdrop flex items-start justify-center pt-16 sm:pt-24 px-4" onclick="if(event.target===this)closeModal()">
      <div class="modal-panel w-full max-w-xl bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-gray-200 dark:border-slate-800 overflow-hidden">
        <div class="flex items-center gap-2 px-4 py-3 border-b border-gray-200 dark:border-slate-800">
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 110-15 7.5 7.5 0 010 15z"/></svg>
          <input id="global-search" type="text" placeholder="חפש משימות, הרגלים, לידים, הוצאות..." class="flex-1 bg-transparent outline-none text-sm" autocomplete="off"/>
          <kbd>Esc</kbd>
        </div>
        <div id="global-search-results" class="max-h-96 overflow-y-auto p-2 text-sm"></div>
      </div>
    </div>`;
  const input = document.getElementById('global-search');
  input.focus();
  let debounce;
  let selectedIdx = 0;
  const render = () => {
    const q = input.value.trim().toLowerCase();
    const container = document.getElementById('global-search-results');
    if (!q) {
      container.innerHTML = `<div class="text-xs text-gray-500 dark:text-slate-400 px-3 py-4 text-center">התחל להקליד כדי לחפש בכל הדשבורד</div>`;
      return;
    }
    const match = (s) => s && String(s).toLowerCase().includes(q);
    const groups = [];

    const tMatches = (D?.tasks?.openList || []).concat(D?.tasks?.doneList || []).filter(t => match(t.text)).slice(0, 6);
    if (tMatches.length) groups.push({ title: '📋 משימות', tab: 'tasks', items: tMatches.map(t => ({ label: t.text, sub: `#${t.id} · ${t.priority}`, tab: 'tasks' })) });

    const hMatches = (D?.habits || []).filter(h => match(h.name)).slice(0, 6);
    if (hMatches.length) groups.push({ title: '✅ הרגלים', tab: 'habits', items: hMatches.map(h => ({ label: (h.icon || '') + ' ' + h.name, sub: `🔥 ${h.streak || 0} ימים`, tab: 'habits' })) });

    const lMatches = (D?.leads || []).filter(l => match(l.name) || match(l.email) || match(l.phone) || match(l.title)).slice(0, 6);
    if (lMatches.length) groups.push({ title: '💼 לידים', tab: 'leads', items: lMatches.map(l => ({ label: l.name, sub: l.title, tab: 'leads' })) });

    const eMatches = (D?.expenses?.recent || []).filter(e => match(e.vendor) || match(e.category)).slice(0, 6);
    if (eMatches.length) groups.push({ title: '💰 הוצאות', tab: 'expenses', items: eMatches.map(e => ({ label: e.vendor || '—', sub: `${e.currency === 'USD' ? '$' : '₪'}${fmt(e.amount)} · ${e.category || ''}`, tab: 'expenses' })) });

    if (!groups.length) {
      container.innerHTML = `<div class="text-xs text-gray-500 dark:text-slate-400 px-3 py-8 text-center">לא נמצאו תוצאות ל"${esc(q)}"</div>`;
      return;
    }

    // Flatten for arrow-key navigation
    const flat = [];
    groups.forEach(g => g.items.forEach(it => flat.push(it)));
    selectedIdx = Math.min(selectedIdx, flat.length - 1);

    let idx = 0;
    container.innerHTML = groups.map(g => `
      <div class="px-3 pt-2 pb-1 text-[10px] uppercase tracking-wider text-gray-400 dark:text-slate-500 font-semibold">${g.title}</div>
      ${g.items.map(it => {
        const i = idx++;
        return `<button data-idx="${i}" data-tab="${it.tab}" class="w-full flex items-center justify-between gap-3 px-3 py-2 rounded-lg text-right hover:bg-gray-100 dark:hover:bg-slate-800 ${i === selectedIdx ? 'bg-gray-100 dark:bg-slate-800' : ''}">
          <span class="flex-1 min-w-0 truncate">${esc(it.label)}</span>
          <span class="text-xs text-gray-500 dark:text-slate-400 flex-shrink-0">${esc(it.sub || '')}</span>
        </button>`;
      }).join('')}
    `).join('');
    container.querySelectorAll('button[data-tab]').forEach(btn => {
      btn.onclick = () => { closeModal(); showTab(btn.dataset.tab); };
    });
  };
  input.addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(render, 150); });
  input.addEventListener('keydown', (e) => {
    const buttons = document.querySelectorAll('#global-search-results button[data-tab]');
    if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx + 1, buttons.length - 1); render(); buttons[selectedIdx]?.scrollIntoView({ block: 'nearest' }); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, 0); render(); buttons[selectedIdx]?.scrollIntoView({ block: 'nearest' }); }
    else if (e.key === 'Enter') { e.preventDefault(); buttons[selectedIdx]?.click(); }
  });
  render();
}

// ── Keyboard shortcut handler ────────────────────────────────────────────────
let keySequence = '';
let keySequenceTimer = null;
document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea, select, [contenteditable]')) return;

  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openSearchModal(); return; }
  if (e.key === 'Escape') { closeModal(); return; }
  if (e.key === '?') { e.preventDefault(); showShortcutsModal(); return; }

  if (e.key.toLowerCase() === 'g' && !e.ctrlKey && !e.metaKey && !e.altKey) {
    keySequence = 'g';
    clearTimeout(keySequenceTimer);
    keySequenceTimer = setTimeout(() => keySequence = '', 1500);
    return;
  }
  if (keySequence === 'g') {
    const map = { t: 'tasks', h: 'habits', l: 'leads', o: 'overview', e: 'expenses', s: 'stocks' };
    const t = map[e.key.toLowerCase()];
    if (t) { e.preventDefault(); showTab(t); keySequence = ''; return; }
  }

  if (e.key.toLowerCase() === 'n' && activeTab === 'tasks') {
    e.preventDefault(); document.getElementById('new-task-input')?.focus(); return;
  }
  if (e.key.toLowerCase() === 'f' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); toggleFocusMode(); }
});

const initialTab = window.location.hash.slice(1);
if (TABS.includes(initialTab)) activeTab = initialTab;
